run_name: llamea_dense_1kplus
suite_config: configs/tsp_large_suite.yaml

llm:
  provider: groq
  model: llama-3.3-70b-versatile
  max_llm_calls: 40
  temperature: 0.8
  top_p: 1.0
  groq_max_keys: 10
  calls_per_minute_per_key: 2
  request_timeout_s: 60
  max_429_retries: 100
  max_request_error_retries: 5

search:
  selection_strategy: "1+1"
  history_limit: 20
  invalid_parent_redesign: true
  redesign_on_any_invalid_before_full_valid: true
  redesign_on_timeout_parent: true
  hide_invalid_parent_code: false
  historical_family_avoidance: false
  strict_constructive_only: false
  family_focus_mode: false
  family_focus_calls_per_family: 20
  family_focus_plan: []

runtime:
  global_seed: 12345
  candidate_timeout_s: 60
  eval_split: train
  smoke_test: false
  partial_failure_penalty: 200.0


popmusic:
  use_popmusic_candidates: false
  use_popmusic_edge_prior: false
  prior_mode: none
  max_candidates: 20

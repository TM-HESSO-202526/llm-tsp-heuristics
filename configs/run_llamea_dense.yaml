run_name: llamea_dense_1kplus
suite_config: configs/tsp_large_suite.yaml

llm:
  provider: groq
  model: llama-3.3-70b-versatile
  max_llm_calls: 40
  temperature: 0.8
  top_p: 1.0
  groq_max_keys: 10
  calls_per_minute_per_key: 2
  request_timeout_s: 60
  max_429_retries: 100
  max_request_error_retries: 5

search:
  selection_strategy: "1+1"
  history_limit: 20
  invalid_parent_redesign: true
  redesign_on_any_invalid_before_full_valid: true
  redesign_on_timeout_parent: true
  hide_invalid_parent_code: false

runtime:
  global_seed: 12345
  candidate_timeout_s: 60
  evaluation_timeout_s: 120
  eval_split: train
  smoke_test: false
  dry_run: false
  partial_failure_penalty: 200.0

feedback:
  include_invalid_code_in_feedback: true
  include_invalid_error_trace: true
  include_parent_code_in_mutation_prompt: true
  save_raw_llm_responses: true
  save_generated_attempts: true

popmusic:
  use_popmusic_candidates: false
  use_popmusic_edge_prior: false
  prior_mode: none
  max_candidates: 20
  restrict_edge_cost_to_candidates: false
  allow_non_candidate_edges_in_final_tour: true

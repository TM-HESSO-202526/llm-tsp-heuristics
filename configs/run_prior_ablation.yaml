run_name: prior_ablation_1kplus
experiment_mode: prior_ablation
suite_config: configs/tsp_large_suite.yaml

runtime:
  global_seed: 12345
  eval_splits: [train, val, test]
  repetitions: 1
  dry_run: false

popmusic:
  use_popmusic_candidates: true
  max_candidates: 20
  restrict_edge_cost_to_candidates: true

methods:
  - distance_only
  - prior_only_frequency
  - distance_plus_prior
  - binary_top2_prior
  - binary_top3_prior
  - shuffled_prior

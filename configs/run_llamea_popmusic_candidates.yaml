run_name: llamea_popmusic_candidates_1kplus
suite_config: configs/tsp_large_suite.yaml

llm:
  provider: groq
  model: llama-3.3-70b-versatile
  max_llm_calls: 40
  temperature: 0.8
  top_p: 1.0
  groq_max_keys: 10
  calls_per_minute_per_key: 2
  request_timeout_s: 60
  max_429_retries: 100
  max_request_error_retries: 5

search:
  selection_strategy: "1+1"
  history_limit: 20
  invalid_parent_redesign: true
  redesign_on_any_invalid_before_full_valid: true
  redesign_on_timeout_parent: true
  hide_invalid_parent_code: false
  historical_family_avoidance: false
  family_novelty_mode: false
  family_memory_limit: 8
  min_family_attempts_before_avoid: 5
  weak_family_score_threshold: 20.0
  allow_strong_family_exploitation: true

runtime:
  global_seed: 12345
  candidate_timeout_s: 60
  evaluation_timeout_s: 120
  eval_split: train
  smoke_test: false
  dry_run: false
  partial_failure_penalty: 200.0


popmusic:
  use_popmusic_candidates: true
  use_popmusic_edge_prior: true
  prior_mode: frequency
  max_candidates: 20
  restrict_edge_cost_to_candidates: true
  allow_non_candidate_edges_in_final_tour: false

lkh:
  lkh_binary: /content/tools/lkh/LKH
  max_candidates: 20
  popmusic_sample_size: 14
  popmusic_solutions: 20
  popmusic_max_neighbors: 5
  popmusic_trials: 1
  popmusic_initial_tour: false
